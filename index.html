<!doctype html>
<html lang="en" data-app-name="AMICUS">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0078D4" />
    <title>AMICUS — AI-powered email briefing assistant</title>
    <meta name="description" content="AMICUS connects to your Google or Microsoft inbox and delivers a clear, prioritised daily email brief every morning. Spend less time in your inbox, more time on what matters." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://amicus.azullogic.com" />
    <meta property="og:title" content="AMICUS — AI-powered email briefing assistant" />
    <meta property="og:description" content="AMICUS connects to your Google or Microsoft inbox and delivers a clear, prioritised daily email brief every morning." />
    <meta property="og:site_name" content="AMICUS" />
    <script>
      (function() {
        var t = localStorage.getItem('amicus-theme');
        var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static content for crawlers and no-JS environments -->
      <noscript>
        <div style="font-family: sans-serif; max-width: 720px; margin: 0 auto; padding: 48px 24px; color: #1e293b;">
          <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 8px;">AMICUS</h1>
          <p style="font-size: 1.1rem; color: #475569; margin-bottom: 24px;">
            AI-powered email briefing assistant by AzulLogic
          </p>
          <p style="color: #64748b; line-height: 1.7; margin-bottom: 32px;">
            AMICUS connects to your Google or Microsoft email account and delivers a clear,
            prioritised daily brief every morning — so you always know what needs your attention
            without spending an hour in your inbox.
          </p>
          <h2 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 12px;">What AMICUS does</h2>
          <ul style="color: #64748b; line-height: 2; padding-left: 20px; margin-bottom: 32px;">
            <li>Summarises your inbox into a daily email brief</li>
            <li>Prioritises emails based on the topics and senders that matter to you</li>
            <li>Delivers your brief at a time and timezone you choose</li>
            <li>Provides inbox analytics — volume trends, busiest senders, response times</li>
            <li>Sends push and calendar reminders to help you plan your day</li>
          </ul>
          <div style="margin-bottom: 32px;">
            <a href="/login" style="display: inline-block; padding: 12px 24px; background: #2563eb; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600;">
              Sign in to AMICUS
            </a>
          </div>
          <nav style="font-size: 0.85rem; color: #94a3b8;">
            <a href="/terms" style="color: #64748b; margin-right: 16px;">Terms of Service</a>
            <a href="/privacy" style="color: #64748b; margin-right: 16px;">Privacy Policy</a>
            <a href="mailto:info@azullogic.com" style="color: #64748b;">Contact</a>
          </nav>
        </div>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
